services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: obsidian-qdrant
    ports:
      - "6333:6333"    # Port REST API & Dashboard UI (HTTP)
      - "6334:6334"    # Port gRPC API (for faster communication)
    volumes:
      # Save data to a local directory on the host machine for persistence
      - ../../../data/qdrant_storage:/qdrant/storage:z
    environment:
      # Turn on gRPC API for faster communication with the Qdrant service
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local